# Crear README.md si no existe (para la explicación)
echo "# Diferencias CD manual vs automático ..." > README.md
# Editar el workflow para agregar deploy simulado
nano .github/workflows/ci.yml    # Agrega el paso de echo
# Editar test_connection.py (opcional)
nano test_connection.py           # Agrega la detección de CI
# Agregar, commit y push
git add .
