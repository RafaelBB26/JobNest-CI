# Cuando pida usuario y contraseña, usa: usuario = RafaelBB26, contraseña = TU_TOKENname: CI/CD JobNest

on:
  push:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Clonar repositorio
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        pip install -r requirements.txt

    - name: Ejecutar pruebas
      run: |
        python test_connection.py

    - name: Login a DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Construir imagen Docker
      run: docker build -t rbb26/jobnest:latest .

    - name: Subir imagen a DockerHub
      run: docker push rbb26/jobnest:latest
